name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  tests-and-quality:
    name: Code Quality and Unit Tests
    runs-on: [self-hosted, deploy]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle (Linter)
        run: mvn checkstyle:check

      - name: Run Unit Tests
        run: mvn test

  build-and-push:
    name: Build and Push Docker Image
    runs-on: [self-hosted, deploy]
    needs: tests-and-quality
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy and Verify
    runs-on: [self-hosted, deploy]
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Local Docker Run Deployment
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/${{ github.repository }}:latest
          
          docker stop app || true
          docker rm app || true
          
          docker run -d \
            --name app \
            -p 8080:8080 \
            --restart always \
            ghcr.io/${{ github.repository }}:latest
          
          docker image prune -f

      - name: Wait for service initialization
        run: sleep 10

      - name: Run Verification Script
        run: |
          chmod +x ./verify-deploy.sh
          ./verify-deploy.sh 127.0.0.1 80